# Unity HPC pretrain config — identical to config_pretrain.yml but with
# evaluators disabled (the evaluators.arc package is not in this repo).

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

data_paths: ['data/sudoku-extreme-full']
data_paths_test: ['data/sudoku-extreme-full']

max_train_samples: 100000
max_test_samples: 20000

# Evaluators disabled — the arc evaluator package is not present in this repo.
evaluators: []

# Hyperparams - Training
global_batch_size: 16

epochs: 100
eval_interval: 10
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

# Hyperparams - Puzzle embeddings training
puzzle_emb_lr: 1e-2

seed: 0
min_eval_interval: 0

ema: False
ema_rate: 0.999
freeze_weights: False
