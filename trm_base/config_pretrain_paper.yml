# Pretrain config matching the Samsung TRM paper (Sudoku-Extreme, attention variant).
# Paper: "Less is More: Recursive Reasoning with Tiny Networks"
# Expected: ~75% exact-accuracy on Sudoku-Extreme (attention variant)
# Runtime:  ~18-20 hours on 1x L40S

defaults:
  - arch: trm_paper
  - _self_

hydra:
  output_subdir: null

# Dataset: 1000 puzzles x 1000 augmentations (built by prepare_data_paper.sh)
data_paths: ['data/sudoku-extreme-1k-aug-1000']
data_paths_test: ['data/sudoku-extreme-1k-aug-1000']

max_train_samples: null
max_test_samples: null

evaluators: []

# --- Paper hyperparams (Sudoku-Extreme) ---
global_batch_size: 768

epochs: 50000
eval_interval: 5000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

puzzle_emb_lr: 1e-4

seed: 0
min_eval_interval: 0

ema: False
ema_rate: 0.999
freeze_weights: False
